<!doctype html>
<html lang="en">
  <head>
    <title>Puppy Bowl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Puppy Bowl</h1>
    </header>

    <main>
      <section id="roster-section">
        <h2>Puppy Roster</h2>
        <div id="puppy-roster"></div>
      </section>

      <section id="details-section">
        <h2>Puppy Details</h2>
        <div id="puppy-details">
          <p>Select a puppy to see more information.</p>
        </div>
      </section>

      <section id="form-section">
        <h2>Invite a New Puppy</h2>
        
        <form id="new-puppy-form">
          <label>
            Name
            <input type="text" name="name" required>
          </label>

          <label>
            Breed
            <input type="text" name="breed" required>
          </label>

          <label>
            Status
            <select name="status">
              <option value="bench">Bench</option>
              <option value="field">Field</option>
            </select>
          </label>

          <label>
            Team
            <select name="teamId" id="team-select">
              <option value="">Unassigned</option>
              <option value="1">Fluff</option>
              <option value="2">Ruff</option>
            </select>
          </label>

          <label>
            Image URL
            <input type="text" name="imageUrl">
          </label>

          <button class="invite-button" type="submit">
            Invite Puppy
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
